<script>
const {
  useState,
  useEffect,
  useMemo
} = React;

/* ---------- storage: IndexedDB for clients (large capacity), localStorage for small settings ---------- */
const LEGACY_STORAGE_KEY = "wa-clients";
const TEMPLATE_KEY = "wa-message-template";
const DEFAULT_TEMPLATE = "Bonjour {prenom}, je reviens vers vous concernant votre demande. N\'hésitez pas si vous avez des questions !";
const DB_NAME = "suivi-whatsapp-db";
const DB_STORE = "clients";
function openClientsDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE, {
          keyPath: "id"
        });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetAllClients() {
  const db = await openClientsDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
async function idbReplaceAllClients(clients) {
  const db = await openClientsDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    const store = tx.objectStore(DB_STORE);
    store.clear();
    clients.forEach(c => store.put(c));
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function loadClientsAsync() {
  try {
    const fromDB = await idbGetAllClients();
    if (fromDB.length > 0) return fromDB;
    // migrate legacy localStorage data (older version of the app) into IndexedDB, once
    try {
      const raw = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (raw) {
        const legacy = JSON.parse(raw);
        if (Array.isArray(legacy) && legacy.length > 0) {
          await idbReplaceAllClients(legacy);
          return legacy;
        }
      }
    } catch (e) {}
    return [];
  } catch (e) {
    return [];
  }
}
async function saveClientsAsync(next) {
  try {
    await idbReplaceAllClients(next);
    return true;
  } catch (e) {
    return false;
  }
}
function loadTemplate() {
  try {
    return localStorage.getItem(TEMPLATE_KEY) || DEFAULT_TEMPLATE;
  } catch (e) {
    return DEFAULT_TEMPLATE;
  }
}
function saveTemplate(text) {
  try {
    localStorage.setItem(TEMPLATE_KEY, text);
    return true;
  } catch (e) {
    return false;
  }
}

const IconClip = p => /*#__PURE__*/React.createElement(Icon, p, "📋");
function extractPhoneNumbers(text) {
  const re = /(\+\d{1,4}(?:[\s.-]?\d{2,4}){2,5})|(0[1-9](?:[\s.-]?\d{2}){4})/g;
  const matches = text.match(re) || [];
  const cleaned = matches.map(m => m.replace(/[\s.-]/g, "")).filter(m => m.replace(/^\+/, "").length >= 8 && m.replace(/^\+/, "").length <= 14);
  return [...new Set(cleaned)];
}
const IconExport = p => /*#__PURE__*/React.createElement(Icon, p, "📤");
const IconCamera = p => /*#__PURE__*/React.createElement(Icon, p, "📷");

/* ---------- helpers ---------- */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function daysBetween(a, b) {
  const ms = new Date(b).setHours(0, 0, 0, 0) - new Date(a).setHours(0, 0, 0, 0);
  return Math.round(ms / 86400000);
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function normalizeDate(value) {
  if (!value) return "";
  if (value instanceof Date && !isNaN(value)) return value.toISOString().slice(0, 10);
  const parsed = new Date(value);
  if (!isNaN(parsed)) return parsed.toISOString().slice(0, 10);
  return "";
}
function waLink(phone, text) {
  let cleaned = (phone || "").replace(/[^\d+]/g, "");
  if (cleaned.startsWith("+")) cleaned = cleaned.slice(1);else if (cleaned.startsWith("0")) cleaned = "33" + cleaned.slice(1);
  const base = `https://wa.me/${cleaned}`;
  return text ? `${base}?text=${encodeURIComponent(text)}` : base;
}
function fillTemplate(template, client) {
  const firstName = (client.name || "").split(" ")[0];
  return (template || "").replaceAll("{nom}", client.name || "").replaceAll("{prenom}", firstName);
}
function splitPhones(phone) {
  return (phone || "").split(",").map(p => p.trim()).filter(Boolean);
}
function pulseColor(daysSince) {
  if (daysSince >= 5) return "#E76F51";
  if (daysSince >= 2) return "#D4A24C";
  return "#7FA98C";
}
const STATUS = {
  a_relancer: {
    label: "À relancer",
    color: "#E76F51"
  },
  relance: {
    label: "Relancé",
    color: "#D4A24C"
  },
  converti: {
    label: "Converti",
    color: "#7FA98C"
  },
  perdu: {
    label: "Perdu",
    color: "#5C6577"
  }
};
const STATUS_ALIASES = {
  "à relancer": "a_relancer",
  "a relancer": "a_relancer",
  "relancé": "relance",
  "relance": "relance",
  "converti": "converti",
  "perdu": "perdu"
};
function findField(row, aliases) {
  const keys = Object.keys(row);
  const key = keys.find(k => aliases.includes(k.trim().toLowerCase()));
  return key !== undefined ? row[key] : "";
}
function rowToClient(row) {
  const name = String(findField(row, ["nom", "name", "client", "nom du client"]) || "").trim();
  const phone = String(findField(row, ["téléphone", "telephone", "phone", "tel", "numéro", "numero", "numéro whatsapp"]) || "").trim();
  const note = String(findField(row, ["note", "notes", "remarque", "commentaire"]) || "").trim();
  const rawStatus = String(findField(row, ["statut", "status"]) || "").trim().toLowerCase();
  const rawDate = findField(row, ["dernier contact", "date", "date de contact", "last contact"]);
  const lastContact = normalizeDate(rawDate) || todayISO();
  return {
    name,
    phone,
    note,
    lastContact,
    nextFollowup: addDays(lastContact, 3),
    status: STATUS_ALIASES[rawStatus] || "a_relancer"
  };
}
function parsePastedTable(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  if (lines.length < 2) return [];
  const delimiter = lines[0].includes("\t") ? "\t" : ",";
  const headers = lines[0].split(delimiter).map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = line.split(delimiter);
    const row = {};
    headers.forEach((h, i) => {
      row[h] = cells[i] !== undefined ? cells[i].trim() : "";
    });
    return row;
  });
}
function exportToTSV(clients) {
  const header = ["Nom", "Téléphone", "Note", "Statut", "Dernier contact", "Prochaine relance"];
  const lines = clients.map(c => [c.name, c.phone || "", (c.note || "").replace(/\t|\n/g, " "), STATUS[c.status]?.label || c.status, c.lastContact || "", c.nextFollowup || ""].join("\t"));
  return [header.join("\t"), ...lines].join("\n");
}

/* ---------- main app ---------- */
function App() {
  const [clients, setClients] = useState(null);
  const [filter, setFilter] = useState("actifs");
  const [query, setQuery] = useState("");
  const [modal, setModal] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [importMsg, setImportMsg] = useState("");
  const [importOpen, setImportOpen] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [exportOpen, setExportOpen] = useState(false);
  const [template, setTemplateState] = useState(() => loadTemplate());
  const [templateOpen, setTemplateOpen] = useState(false);
  const [quickSendOpen, setQuickSendOpen] = useState(false);
  const [photoImportOpen, setPhotoImportOpen] = useState(false);
  const [storageError, setStorageError] = useState("");
  const [selectedIds, setSelectedIds] = useState(() => new Set());
  const [bulkSendOpen, setBulkSendOpen] = useState(false);
  useEffect(() => {
    loadClientsAsync().then(setClients);
  }, []);
  function setTemplate(text) {
    setTemplateState(text);
    saveTemplate(text);
  }
  function persist(next) {
    setClients(next);
    saveClientsAsync(next).then(ok => {
      if (!ok) setStorageError("Échec de l'enregistrement (stockage plein ou indisponible). Réessaie, ou exporte tes données par sécurité.");else setStorageError("");
    });
  }
  function saveClient(data) {
    if (data.id) persist(clients.map(c => c.id === data.id ? data : c));else persist([...clients, {
      ...data,
      id: uid()
    }]);
    setModal(null);
  }
  function markRelance(client) {
    const today = todayISO();
    saveClient({
      ...client,
      lastContact: today,
      nextFollowup: addDays(today, 3),
      status: "relance"
    });
  }
  function toggleFlag(client, flag) {
    persist(clients.map(c => c.id === client.id ? {
      ...c,
      [flag]: !c[flag]
    } : c));
  }
  function deleteClient(id) {
    persist((clients || []).filter(c => c.id !== id));
    setConfirmDelete(null);
  }
  function mergeImportedRows(rows) {
    const current = clients || [];
    const imported = rows.map(rowToClient).filter(c => c.name);
    if (imported.length === 0) {
      setImportMsg("Aucune ligne valide reconnue. Vérifie qu\'une colonne \'Nom\' existe.");
      return;
    }
    const existingPhones = new Set(current.map(c => c.phone).filter(Boolean));
    const existingNames = new Set(current.map(c => c.name.toLowerCase()));
    const fresh = imported.filter(c => {
      if (c.phone && existingPhones.has(c.phone)) return false;
      if (!c.phone && existingNames.has(c.name.toLowerCase())) return false;
      return true;
    });
    const skipped = imported.length - fresh.length;
    persist([...current, ...fresh.map(c => ({
      ...c,
      id: uid()
    }))]);
    setImportMsg(`${fresh.length} client${fresh.length > 1 ? "s" : ""} importé${fresh.length > 1 ? "s" : ""}` + (skipped > 0 ? ` · ${skipped} déjà présent${skipped > 1 ? "s" : ""} ignoré${skipped > 1 ? "s" : ""}` : ""));
    setPasteText("");
    setImportOpen(false);
  }
  function handleImportPaste() {
    mergeImportedRows(parsePastedTable(pasteText));
  }
  async function handleImportFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImportMsg("Lecture du fichier...");
    try {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, {
        type: "array",
        cellDates: true
      });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {
        defval: ""
      });
      mergeImportedRows(rows);
    } catch (err) {
      setImportMsg("Impossible de lire ce fichier. Vérifie qu\'il s\'agit bien d\'un .xlsx.");
    }
    e.target.value = "";
  }
  const enriched = useMemo(() => {
    const today = todayISO();
    return (clients || []).map(c => ({
      ...c,
      daysSince: daysBetween(c.lastContact, today),
      overdue: c.nextFollowup && c.nextFollowup <= today && c.status !== "converti" && c.status !== "perdu"
    })).filter(c => c.name.toLowerCase().includes(query.toLowerCase()) || (c.phone || "").includes(query)).filter(c => {
      if (filter === "tous") return true;
      if (filter === "actifs") return c.status !== "converti" && c.status !== "perdu";
      if (filter === "relancer") return c.overdue;
      if (filter === "termines") return c.status === "converti" || c.status === "perdu";
      if (filter === "favoris") return !!c.favori;
      if (filter === "liste") return !!c.liste;
      return true;
    }).sort((a, b) => {
      if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
      const an = a.nextFollowup || "9999",
        bn = b.nextFollowup || "9999";
      return an < bn ? -1 : an > bn ? 1 : 0;
    });
  }, [clients, filter, query]);
  const stats = useMemo(() => {
    const today = todayISO();
    const list = clients || [];
    return {
      overdue: list.filter(c => c.nextFollowup && c.nextFollowup <= today && c.status !== "converti" && c.status !== "perdu").length,
